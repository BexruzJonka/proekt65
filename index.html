<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-[#C4B5A5] dark:bg-black transition-colors duration-300 min-h-screen font-sans">

    <header class="flex justify-between items-center px-12 py-8">
        <div class="text-2xl font-bold dark:text-white">LOGO</div>
        
        <nav class="flex items-center space-x-8">
            <ul class="flex space-x-6 dark:text-gray-300">
                <li><a href="#" class="hover:opacity-70">Home</a></li>
                <li><a href="#" class="hover:opacity-70">About us</a></li>
                <li><a href="#" class="hover:opacity-70">Portfolio</a></li>
            </ul>

            <div class="flex bg-black/10 dark:bg-white/10 p-1 rounded-lg">
                <button onclick="setTheme('light')" 
                    class="px-4 py-1 rounded-md text-sm transition-all bg-[#FF9F43] text-white dark:bg-transparent dark:text-gray-400">
                    LightMode
                </button>
                <button onclick="setTheme('dark')" 
                    class="px-4 py-1 rounded-md text-sm transition-all bg-transparent text-gray-600 dark:bg-[#FF9F43] dark:text-white">
                    DarkMode
                </button>
            </div>
        </nav>
    </header>

    <main class="flex flex-col md:flex-row items-center px-12 mt-12 gap-12">
        <div class="md:w-1/2">
            <h1 class="text-5xl font-bold leading-tight dark:text-white mb-6">
                Work that we produce <br> for our clients
            </h1>
            <p class="text-gray-700 dark:text-gray-400 mb-8 max-w-md">
                Lorem Ipsum is simply dummy text of the printing and typesetting industry. 
                Lorem Ipsum has been the industry's standard.
            </p>
            <button class="bg-[#FF9F43] text-white px-8 py-3 rounded-full font-medium hover:bg-[#e88f3a] transition-all">
                Get more details
            </button>
        </div>

        <div class="md:w-1/2">
            <img src="https://img.freepik.com/free-photo/cyberpunk-city-street-night_23-2151640470.jpg" 
                 alt="Project" 
                 class="rounded-xl shadow-2xl w-full object-cover h-[400px]">
        </div>
    </main>

    <script>
        function setTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            setTheme('dark');
        }
    </script>
</body>
</html>
